<!DOCTYPE html>
<html lang="en-CA">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQ0VPE0KMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-GQ0VPE0KMT');

    <title>Luxury Wedding Planner & Venues in Portugal | Stacey Marquez Weddings</title>
    <meta name="description" content="Specialist in luxury wedding venues in Portugal and destination wedding planning for Canadians. Stacey Marquez offers bespoke venue scouting and full coordination.">
    <meta name="keywords" content="wedding planner portugal, wedding venues in portugal, destination wedding portugal, luxury weddings portugal, wedding venues lisbon, weddings for canadians in portugal">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">
    
    <style>
        @font-face {
            font-family: 'TAN Aegean';
            src: url('TAN - AEGEAN Regular.ttf') format('truetype');
            font-weight: 100;
            font-style: normal;
        }

        @font-face {
            font-family: 'Blosta Script';
            src: url('Blosta-Script.otf') format('opentype'),
                 url('Blosta-Script.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-neutral: #f4f2f0;
            --text-dark: #2a2622;
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg-neutral);
            color: var(--text-dark);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 60px;
            z-index: 3000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        header.scrolled {
            padding: 15px 60px;
            background: rgba(244, 242, 240, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-img {
            height: 130px; 
            width: auto;
            max-width: 560px;
            filter: brightness(0) invert(1);
            transition: var(--transition);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .instagram-icon {
            width: 24px; height: 24px;
            transition: var(--transition);
            filter: brightness(0) invert(1);
        }

        .menu-toggle {
            width: 44px; height: 44px;
            cursor: pointer;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            z-index: 4000;
        }

        .menu-toggle span {
            position: absolute;
            width: 30px; height: 1px;
            background: #ffffff;
            transition: var(--transition);
        }

        .menu-toggle span:nth-child(1) { transform: translateY(-8px); }
        .menu-toggle span:nth-child(2) { width: 20px; margin-left: 10px; }
        .menu-toggle span:nth-child(3) { transform: translateY(8px); }

        header.scrolled .logo-img,
        body.menu-open .logo-img,
        header.scrolled .instagram-icon,
        body.menu-open .instagram-icon {
            filter: brightness(0.2);
        }

        header.scrolled .menu-toggle span,
        body.menu-open .menu-toggle span {
            background: var(--text-dark);
        }

        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translateY(0); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translateY(0); }

        .menu-overlay {
            position: fixed; inset: 0;
            background: var(--bg-neutral);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 2500;
        }

        .menu-overlay.active { opacity: 1; visibility: visible; }
        .menu-overlay nav ul { list-style: none; text-align: center; }
        .menu-overlay nav li { margin: 25px 0; }
        .menu-overlay nav a {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 6px;
            transition: var(--transition);
        }

        #home {
            position: relative;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.3)), 
                        url('weddingsite.jpg') center/cover no-repeat;
            display: flex; 
            flex-direction: column;
            justify-content: flex-start;
            padding-top: 60vh;
        }

        .hero-content {
            width: 100%;
            display: flex;
            flex-direction: column;
            color: #ffffff;
            text-transform: uppercase;
            /* Removemos o alinhamento central global para controlar por linha */
        }

        .line-one, .line-two {
            display: flex;
            align-items: baseline;
            font-family: 'TAN Aegean', serif;
            font-size: clamp(10px, 3.2vw, 38px);
            letter-spacing: 1px;
            line-height: 1.2;
            gap: 25px; /* Define distâncias UNIFORMES entre todas as palavras */
        }

        /* Mantemos o desalinhamento do centro imaginário */
        .line-one {
            justify-content: flex-start;
            padding-left: 25vw; /* Aproximação controlada à esquerda */
        }

        .line-two {
            justify-content: flex-end;
            padding-right: 25vw; /* Aproximação controlada à direita */
            margin-top: 25px;
        }

        .script-font {
            font-family: 'Blosta Script', cursive;
            text-transform: none;
            font-size: 2.5em; /* Tamanho preservado */
            display: inline-block;
            vertical-align: middle;
            line-height: 0.1;
            /* Removi as margens laterais fixas para usar o gap do flexbox */
        }

        /* Removi os translateX complexos que causavam sobreposição */

        .sub-slogan {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(10px, 1.2vw, 15px);
            font-weight: 300; 
            text-transform: uppercase;
            letter-spacing: 6px;
            color: rgba(255, 255, 255, 0.8);
            white-space: nowrap;
        }

        #cookie-banner {
            position: fixed; bottom: 20px; left: 20px; right: 20px; 
            background: #fff; padding: 20px; 
            z-index: 9999; display: flex; justify-content: space-between; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-radius: 10px; 
            visibility: hidden; opacity: 0; transition: 0.5s ease;
        }

        @media (max-width: 1100px) {
            header, header.scrolled { padding: 15px 25px; }
            .logo-img { height: 90px; }
            #home { padding-top: 55vh; }
            .line-one, .line-two { font-size: 18px; padding: 0 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; }
            .line-one .script-font, .line-two .script-font { display: block; margin: 10px 0; font-size: 1.8em; }
            .sub-slogan { bottom: 30px; letter-spacing: 4px; }
        }
    </style>
</head>
<body id="body">

    <header id="header">
        <a href="index.html">
            <img src="logo.png" alt="Stacey Marquez Weddings" class="logo-img">
        </a>
        <div class="header-right">
            <a href="https://www.instagram.com/staceymarquez.weddings/" target="_blank" rel="noopener">
                <img src="instagram.png" alt="Instagram" class="instagram-icon">
            </a>
            <div class="menu-toggle" id="menuToggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contacts.html">Contacts</a></li>
            </ul>
        </nav>
    </div>

    <section id="home">
        <div class="hero-content">
            <div class="line-one">
                <span>Turning</span> <span class="script-font">love stories</span> <span>into</span>
            </div>
            <div class="line-two">
                <span class="script-font">unforgettable</span> <span>"I do's"</span>
            </div>
        </div>
        <p class="sub-slogan">Destination weddings in Portugal</p>
    </section>

    <div id="cookie-banner">
        <div style="font-size: 12px; letter-spacing: 1px;">This website uses cookies to enhance your experience.</div>
        <div style="display: flex; gap: 10px;">
            <button onclick="acceptCookies()" style="background: #33312e; color: #fff; border: none; padding: 10px 20px; cursor: pointer; text-transform: uppercase; font-size: 10px; border-radius: 5px;">Accept</button>
        </div>
    </div>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const body = document.getElementById('body');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            body.classList.toggle('menu-open');
        });

        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });

        function acceptCookies() {
            localStorage.setItem('cookieConsent', 'accepted');
            const banner = document.getElementById('cookie-banner');
            banner.style.opacity = '0';
            setTimeout(() => { banner.style.visibility = 'hidden'; }, 500);
        }

        window.addEventListener('load', function() {
            if (!localStorage.getItem('cookieConsent')) {
                const banner = document.getElementById('cookie-banner');
                banner.style.visibility = 'visible';
                banner.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
