<!DOCTYPE html>
<html lang="en-CA">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-GQ0VPE0KMT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-GQ0VPE0KMT');
    </script>

    <title>Contact Stacey Marquez | Start Planning Your Wedding in Portugal</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;200;300;400;500&display=swap" rel="stylesheet">

    <style>
        /* --- FONTES LOCAIS --- */
        @font-face {
            font-family: 'TAN Aegean';
            src: url('TAN - AEGEAN Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        @font-face {
            font-family: 'Blosta Script';
            src: url('Blosta-Script.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        :root {
            --bg-neutral: #f4f2f0;
            --text-dark: #1a1a1a;
            --transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-neutral);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- HEADER --- */
        header {
            position: fixed;
            top: 0; left: 0; width: 100%;
            padding: 20px 60px;
            z-index: 3000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
        }

        header.scrolled {
            padding: 15px 60px;
            background: rgba(244, 242, 240, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .logo-img {
            height: 130px; 
            width: auto;
            max-width: 560px;
            filter: brightness(0) invert(1);
            transition: var(--transition);
        }

        header.scrolled .logo-img, body.menu-open .logo-img {
            filter: brightness(0);
        }

        .header-right { display: flex; align-items: center; gap: 30px; }

        /* Icones SEMPRE pretos */
        .instagram-icon {
            width: 24px; height: 24px;
            filter: brightness(0);
            transition: var(--transition);
        }

        .menu-toggle {
            width: 44px; height: 44px;
            cursor: pointer;
            position: relative;
            z-index: 4000;
            display: flex; align-items: center; justify-content: center;
        }

        /* Traços do menu SEMPRE pretos */
        .menu-toggle span {
            position: absolute;
            width: 30px; height: 1px;
            background: #000000;
            transition: var(--transition);
        }

        .menu-toggle span:nth-child(1) { transform: translateY(-8px); }
        .menu-toggle span:nth-child(2) { width: 20px; margin-left: 10px; }
        .menu-toggle span:nth-child(3) { transform: translateY(8px); }

        .menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translateY(0); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translateY(0); }

        /* --- MENU OVERLAY --- */
        .menu-overlay {
            position: fixed; inset: 0;
            background: var(--bg-neutral);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease;
            z-index: 2500;
        }

        .menu-overlay.active { opacity: 1; visibility: visible; }
        .menu-overlay nav ul { list-style: none; text-align: center; }
        .menu-overlay nav li { margin: 25px 0; }
        .menu-overlay nav a {
            font-size: 24px;
            color: var(--text-dark);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 6px;
        }

        /* --- LAYOUT --- */
        main { display: flex; width: 100%; min-height: 100vh; }
        
        .image-side { flex: 0 0 50%; height: 100vh; position: sticky; top: 0; }
        .image-side img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .content-side { 
            flex: 0 0 50%;
            padding: 200px 8% 80px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            background-color: var(--bg-neutral);
        }

        /* --- TITULO --- */
        h1.lets-chat { 
            margin-bottom: 60px;
            font-family: 'TAN Aegean', serif;
            font-size: clamp(2.7rem, 4.2vw, 3.85rem); 
            text-transform: uppercase;
            letter-spacing: 1px;
            line-height: 1;
            font-weight: 100;
        }

        /* --- FORM --- */
        form { display: flex; flex-direction: column; gap: 25px; width: 100%; }
        
        input, textarea { 
            width: 100%; 
            padding: 15px 0; 
            background: transparent; 
            border: none; 
            border-bottom: 1px solid rgba(0,0,0,0.1); 
            font-family: 'Montserrat', sans-serif; 
            font-weight: 300;
            font-size: 1rem; 
            color: var(--text-dark); 
        }

        input:focus, textarea:focus { outline: none; border-bottom-color: var(--text-dark); }
        textarea { min-height: 120px; resize: none; }

        /* --- BOTAO (ALTURA REDUZIDA) --- */
        button { 
            margin-top: 20px; 
            padding: 3px 15px; /* Padding vertical reduzido para diminuir a altura da caixa */
            background-color: var(--text-dark); 
            border: none; 
            color: #ffffff; 
            font-family: 'Blosta Script', cursive;
            font-size: 2.2rem; /* Texto mantém o tamanho */
            text-transform: none;
            cursor: pointer; 
            transition: var(--transition); 
        }
        
        button:hover { opacity: 0.9; }

        /* --- MOBILE --- */
        @media (max-width: 1100px) {
            main { flex-direction: column; }
            .image-side { flex: none; width: 100%; height: 45vh; position: relative; }
            .content-side { flex: none; width: 100%; padding: 60px 30px; }
            header, header.scrolled { padding: 15px 25px; }
            .logo-img { height: 90px; }
            h1.lets-chat { text-align: center; }
        }

        .reveal { opacity: 0; animation: revealUp 1.2s forwards; }
        @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body id="body">

    <header id="header">
        <a href="index.html">
            <img src="logo.png" alt="Stacey Marquez Weddings" class="logo-img">
        </a>
        <div class="header-right">
            <a href="https://www.instagram.com/staceymarquez.weddings/" target="_blank">
                <img src="instagram.png" alt="Instagram" class="instagram-icon">
            </a>
            <div class="menu-toggle" id="menuToggle"><span></span><span></span><span></span></div>
        </div>
    </header>

    <div class="menu-overlay" id="menuOverlay">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="contacts.html">Contact</a></li>
            </ul>
        </nav>
    </div>

    <main>
        <section class="image-side">
            <img src="contact.jpg" alt="Contact Us">
        </section>
        <section class="content-side">
            <h1 class="lets-chat reveal">LET'S chat</h1>

            <form action="https://formspree.io/f/mykjynba" method="POST" class="reveal" style="animation-delay: 0.2s;">
                <input type="text" name="name" placeholder="Name" required>
                <input type="email" name="email" placeholder="E-mail" required>
                <input type="tel" name="phone" placeholder="Phone Number">
                <textarea name="message" placeholder="Give us all the details" required></textarea>
                <button type="submit">send</button>
            </form>
        </section>
    </main>

    <script>
        const menuToggle = document.getElementById('menuToggle');
        const menuOverlay = document.getElementById('menuOverlay');
        const body = document.getElementById('body');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            menuOverlay.classList.toggle('active');
            body.classList.toggle('menu-open');
        });

        window.addEventListener('scroll', () => {
            document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
        });
    </script>
</body>
</html>
